spring:
  application:
    name: spring-ai-integration
  ai:
    google:
     genai:
       api-key: ${GOOGLE_GENAI_API_KEY}
       chat:
         options:
           model: gemini-2.5-flash-lite
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
    enabled: true
    path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
    ddl-auto: update